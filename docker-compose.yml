services:
  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./Backend
    restart: unless-stopped
    env_file:
      - ./Backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    build: ./Frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:
